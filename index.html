<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemesasApp</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f2f2f2;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        .item {
            background: #ffffff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #007bff;
        }

        .item button {
            background: red;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h2>RemesasApp</h2>

    <div class="card">
        <label>Monto (USD):</label>
        <input id="monto" type="number" placeholder="Escribe el monto">

        <label>Tasa (CUP):</label>
        <input id="tasa" type="number" placeholder="Escribe la tasa">

        <h3>Resultado: <span id="resultado">0</span> CUP</h3>

        <button onclick="agregar()">Agregar al historial</button>
        <button style="background:#444" onclick="borrarTodo()">Borrar todo</button>
    </div>

    <h3>Historial</h3>
    <div id="historial"></div>

    <script src="script.js"></script>
</body>
</html>
