<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>App con LocalStorage</title>
</head>
<body>

    <h2>Guardar datos automáticamente</h2>

    <label>Monto:</label>
    <input id="monto" type="number" placeholder="Escribe el monto">

    <br><br>

    <label>Tasa:</label>
    <input id="tasa" type="number" placeholder="Escribe la tasa">

    <br><br>

    <h3>Resultado:</h3>
    <p id="resultado">0</p>

    <script>
        // Cargar datos al abrir la página
        window.onload = function () {
            const montoGuardado = localStorage.getItem("monto");
            const tasaGuardada = localStorage.getItem("tasa");

            if (montoGuardado) document.getElementById("monto").value = montoGuardado;
            if (tasaGuardada) document.getElementById("tasa").value = tasaGuardada;

            calcular();
        };

        // Guardar automáticamente cuando el usuario escribe
        document.getElementById("monto").addEventListener("input", function () {
            localStorage.setItem("monto", this.value);
            calcular();
        });

        document.getElementById("tasa").addEventListener("input", function () {
            localStorage.setItem("tasa", this.value);
            calcular();
        });

        // Función de cálculo
        function calcular() {
            const monto = parseFloat(document.getElementById("monto").value) || 0;
            const tasa = parseFloat(document.getElementById("tasa").value) || 0;

            const resultado = monto * tasa;

            document.getElementById("resultado").textContent = resultado.toFixed(2);

            // Guardar resultado también
            localStorage.setItem("resultado", resultado);
        }
    </script>

</body>
</html>
