<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LocalStorage GitHub</title>
</head>
<body>

<h2>Prueba de guardado en GitHub Pages</h2>

<label>Monto:</label>
<input id="monto" type="number">

<br><br>

<label>Tasa:</label>
<input id="tasa" type="number">

<br><br>

<p>Resultado: <span id="resultado">0</span></p>

<script>
    // Cargar datos al abrir la página
    document.addEventListener("DOMContentLoaded", () => {
        const monto = localStorage.getItem("monto");
        const tasa = localStorage.getItem("tasa");

        if (monto !== null) document.getElementById("monto").value = monto;
        if (tasa !== null) document.getElementById("tasa").value = tasa;

        calcular();
    });

    // Guardar al escribir
    document.getElementById("monto").addEventListener("input", function () {
        localStorage.setItem("monto", this.value);
        calcular();
    });

    document.getElementById("tasa").addEventListener("input", function () {
        localStorage.setItem("tasa", this.value);
        calcular();
    });

    // Función de cálculo
    function calcular() {
        const monto = parseFloat(document.getElementById("monto").value) || 0;
        const tasa = parseFloat(document.getElementById("tasa").value) || 0;

        const resultado = monto * tasa;

        document.getElementById("resultado").textContent = resultado.toFixed(2);

        localStorage.setItem("resultado", resultado);
    }
</script>

</body>
</html>
